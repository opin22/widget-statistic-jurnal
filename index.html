<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:transparent}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.12);padding:12px}
.hero{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.h-item{border-radius:5px;padding:8px 4px;text-align:center;color:#fff}
.h-item .h-icon{font-size:16px;margin-bottom:2px}
.h-item .h-val{font-size:18px;font-weight:700;line-height:1.2}
.h-item .h-lbl{font-size:8px;opacity:.9;margin-top:1px}
.h-scopus{background:#0b6fa4}
.h-sinta{background:#ca8e0a}
.h-impact{background:#c0392b}
.h-gs{background:#27ae60}
.footer{margin-top:8px;padding-top:6px;border-top:1px solid #e0e0e0;font-size:9px;color:#999;text-align:center}
.loading{text-align:center;color:#999;padding:20px 0;font-size:12px}
.error{color:#d32f2f;text-align:center;padding:15px;font-size:12px}
@media(max-width:480px){
  .hero{grid-template-columns:1fr 1fr;gap:4px}
  .h-item{padding:6px 3px}
  .h-item .h-val{font-size:15px}
}
</style>
</head>
<body>
<div class="card">
  <div id="content"><div class="loading">Memuat data…</div></div>
  <div class="footer">Last updated: <span id="updated">—</span></div>
</div>
<script>
(async () => {
  try {
    const res = await fetch('data.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    document.getElementById('updated').textContent = d.updated || '—';
    document.getElementById('content').innerHTML = `
<div class="hero">
  <div class="h-item h-scopus">
    <div class="h-icon">&#128218;</div>
    <div class="h-val"><a href="https://drive.google.com/file/d/1av2ykkPbgM9BW9CZ_uXf098YXFBO7G2Z/view?usp=sharing" target="_blank" rel="noopener" style="color:#fff;text-decoration:none">${d.scopus_citedness ?? '&mdash;'}</a></div>
    <div class="h-lbl">Citedness in Scopus</div>
  </div>
  <div class="h-item h-sinta">
    <div class="h-icon">&#9733;</div>
    <div class="h-val">${d.sinta_rank ?? '&mdash;'}</div>
    <div class="h-lbl">SINTA Accreditation</div>
  </div>
  <div class="h-item h-impact">
    <div class="h-icon">&#128200;</div>
    <div class="h-val">${d.sinta_impact ?? '&mdash;'}</div>
    <div class="h-lbl">SINTA Journal Impact</div>
  </div>
  <div class="h-item h-gs">
    <div class="h-icon">&#127891;</div>
    <div class="h-val">${d.citations}</div>
    <div class="h-lbl">Citations in Google Scholar</div>
  </div>
</div>`;
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="error">Gagal memuat data: ' + e.message + '</div>';
    document.getElementById('updated').textContent = '—';
  }
})();
</script>
</body>
</html>
