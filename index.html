<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:transparent}

.widget{background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.13);padding:6px;overflow:hidden}
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}

/* Kartu */
.h-item{
  position:relative;
  border-radius:7px;
  padding:10px 12px;
  color:#fff;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:72px;
}
.h-scopus{background:#1a7fa8}
.h-sinta {background:#c8920c}
.h-impact{background:#b03030}
.h-gs    {background:#2e9e5a}

/* Baris atas: label platform + logo */
.h-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:4px;
}
.h-platform{
  font-size:11px;
  font-weight:700;
  letter-spacing:.3px;
  opacity:.95;
  line-height:1;
}
.h-logo{
  width:22px;
  height:22px;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.h-logo svg{width:14px;height:14px}
.h-logo img{width:14px;height:14px;object-fit:contain}

/* Baris bawah: angka + label */
.h-bottom{margin-top:6px}
.h-val{
  font-size:22px;
  font-weight:800;
  line-height:1;
  letter-spacing:-.5px;
}
.h-val a{color:inherit;text-decoration:none}
.h-lbl{
  font-size:7.5px;
  opacity:.85;
  margin-top:2px;
  line-height:1.2;
  font-weight:500;
}

/* Dekorasi SVG batik di pojok kanan */
.h-deco{
  position:absolute;
  right:-6px;
  top:50%;
  transform:translateY(-50%);
  opacity:.13;
  pointer-events:none;
}

/* Footer */
.footer{
  margin-top:5px;
  padding:4px 2px 2px;
  border-top:1px solid #e8e8e8;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.footer-left{font-size:8px;color:#999}
.footer-right{font-size:8px;color:#bbb}

/* Loading / error */
.loading{text-align:center;color:#999;padding:20px 0;font-size:11px}
.error{color:#d32f2f;text-align:center;padding:12px;font-size:11px}

/* Responsive */
@media(max-width:600px){
  .hero{grid-template-columns:1fr 1fr;gap:4px}
  .h-item{min-height:64px;padding:8px 10px}
  .h-val{font-size:18px}
}
@media(max-width:340px){
  .hero{grid-template-columns:1fr 1fr}
  .h-val{font-size:16px}
}
</style>
</head>
<body>
<div class="widget">
  <div id="content"><div class="loading">Memuat data…</div></div>
  <div class="footer">
    <span class="footer-left">Last updated: <span id="updated">—</span></span>
    <span class="footer-right">Alsina Journal Statistics</span>
  </div>
</div>

<script>
/* SVG dekorasi batik — motif kawung sederhana, inline, tidak butuh file eksternal */
function batikSVG(color){
  return `<svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" viewBox="0 0 70 70">
    <g fill="none" stroke="${color}" stroke-width="1.4">
      <!-- pola kawung 3x3 -->
      ${[17,35,53].flatMap(cx=>[17,35,53].map(cy=>`
        <ellipse cx="${cx}" cy="${cy}" rx="7" ry="10"/>
        <ellipse cx="${cx}" cy="${cy}" rx="10" ry="7"/>
      `)).join('')}
    </g>
  </svg>`;
}

/* SVG logo sederhana untuk tiap platform */
const LOGOS = {
  scopus:`<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="24" height="24" rx="4" fill="#fff"/>
    <path d="M4 8h6l2 3-2 3H4l2-3-2-3z" fill="#E87722"/>
    <path d="M10 8h10v2H12l1.5 1.5L12 13h8v2H10l-3-3.5L10 8z" fill="#0070C0"/>
  </svg>`,
  sinta:`<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="24" height="24" rx="4" fill="#fff"/>
    <text x="12" y="17" text-anchor="middle" font-size="13" font-weight="900" fill="#c8920c" font-family="Arial">S</text>
  </svg>`,
  impact:`<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="24" height="24" rx="4" fill="#fff"/>
    <polyline points="3,17 8,10 13,13 18,6" stroke="#b03030" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="18" cy="6" r="2" fill="#b03030"/>
  </svg>`,
  gs:`<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="24" height="24" rx="4" fill="#fff"/>
    <text x="12" y="17" text-anchor="middle" font-size="15" font-weight="900" fill="#2e9e5a" font-family="Arial">G</text>
  </svg>`
};

(async () => {
  try {
    const res = await fetch('data.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    document.getElementById('updated').textContent = d.updated || '—';

    const cards = [
      {
        cls:'h-scopus',
        platform:'Scopus<sup style="font-size:6px;vertical-align:super">®</sup>',
        logoKey:'scopus',
        val:`<a href="https://drive.google.com/file/d/1av2ykkPbgM9BW9CZ_uXf098YXFBO7G2Z/view?usp=sharing" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${d.scopus_citedness ?? '—'}</a>`,
        lbl:'Citedness in Scopus',
        deco:'#fff'
      },
      {
        cls:'h-sinta',
        platform:'SINTA',
        logoKey:'sinta',
        val: d.sinta_rank ?? '—',
        lbl:'SINTA Accreditation',
        deco:'#fff'
      },
      {
        cls:'h-impact',
        platform:'SINTA Impact',
        logoKey:'impact',
        val: d.sinta_impact ?? '—',
        lbl:'SINTA Journal Impact',
        deco:'#fff'
      },
      {
        cls:'h-gs',
        platform:'Google Scholar',
        logoKey:'gs',
        val: d.citations,
        lbl:'Citations in Google Scholar',
        deco:'#fff'
      }
    ];

    document.getElementById('content').innerHTML = `<div class="hero">${
      cards.map(c=>`
        <div class="h-item ${c.cls}">
          <div class="h-top">
            <div class="h-platform">${c.platform}</div>
            <div class="h-logo">${LOGOS[c.logoKey]}</div>
          </div>
          <div class="h-bottom">
            <div class="h-val">${c.val}</div>
            <div class="h-lbl">${c.lbl}</div>
          </div>
          <div class="h-deco">${batikSVG(c.deco)}</div>
        </div>
      `).join('')
    }</div>`;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error">Gagal memuat data: ' + e.message + '</div>';
    document.getElementById('updated').textContent = '—';
  }
})();
</script>
</body>
</html>
