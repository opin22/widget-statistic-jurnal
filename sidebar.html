<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:transparent;padding:0}
.card{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:12px}
.header{margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee}
.header h1{font-size:12px;color:#222;font-weight:600}
.header .url{font-size:9px;color:#888;margin-top:1px}
.header .url a{color:#1a73e8;text-decoration:none}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat{text-align:center;padding:8px 4px;background:#f8f9fa;border-radius:4px}
.stat .num{font-size:20px;font-weight:700;color:#1a73e8;line-height:1.2}
.stat .lbl{font-size:9px;color:#666;margin-top:2px}
.footer{margin-top:8px;padding-top:6px;border-top:1px solid #eee;font-size:8px;color:#aaa;text-align:center}
.footer a{color:#1a73e8;text-decoration:none}
.loading{text-align:center;color:#999;padding:20px 0;font-size:11px}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Alsina</h1>
    <div class="url"><a href="https://scholar.google.com/citations?user=TxioLDYAAAAJ" target="_blank">Google Scholar</a></div>
  </div>
  <div id="content"><div class="loading">Memuat…</div></div>
  <div class="footer">Updated: <span id="updated">—</span></div>
</div>
<script>
(async () => {
  try {
    const res = await fetch('data.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    document.getElementById('updated').textContent = d.updated || '—';
    document.getElementById('content').innerHTML = `<div class="stats">
      <div class="stat"><div class="num">${d.citations}</div><div class="lbl">Citations</div></div>
      <div class="stat"><div class="num">${d.hindex}</div><div class="lbl">h-index</div></div>
      <div class="stat"><div class="num">${d.i10index}</div><div class="lbl">i10-index</div></div>
      <div class="stat"><div class="num">${d.citations_since}</div><div class="lbl">Since 2021</div></div>
    </div>`;
  } catch (e) {
    document.getElementById('content').innerHTML = `Error: ${e.message}`;
  }
})();
</script>
</body>
</html>
